apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: issuetracker
spec:
  selector:
    app: jaeger
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: ui
      port: 16686
      targetPort: 16686
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: issuetracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 4317
            - containerPort: 16686