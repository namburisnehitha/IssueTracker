apiVersion: apps/v1
kind: Deployment
metadata:
  name: issuetracker
  namespace: issuetracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: issuetracker
  template:
    metadata:
      labels:
        app: issuetracker
    spec:
      containers:
        - name: issuetracker
          image: issuetracker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: issuetracker-secret
            - configMapRef:
                name: issuetracker-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: issuetracker
  namespace: issuetracker
spec:
  selector:
    app: issuetracker
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080